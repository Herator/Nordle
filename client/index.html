<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Decorative stars matching the icon/banner -->
    <div class="bg-stars" aria-hidden="true">
      <span class="star">✳</span>
      <span class="star">✳</span>
      <span class="star">✳</span>
      <span class="star">✳</span>
      <span class="star">✳</span>
      <span class="star">✳</span>
      <span class="star">✳</span>
    </div>

    <div id="players-sidebar">
      <div id="players-sidebar-title">Spillere</div>
      <div id="players-list"></div>
    </div>

    <div id="game-container">
      <div class="app-header">
        <h1>Nordle</h1>
      </div>
      <div id="message"></div>

      <div class="grid" id="grid">
        <!-- Row 0 (Starting Row) -->
        <div class="row" id="row-0">
          <input type="text" maxlength="1" data-row="0" data-col="0">
          <input type="text" maxlength="1" data-row="0" data-col="1">
          <input type="text" maxlength="1" data-row="0" data-col="2">
          <input type="text" maxlength="1" data-row="0" data-col="3">
          <input type="text" maxlength="1" data-row="0" data-col="4">
        </div>
        <!-- Row 1 -->
        <div class="row" id="row-1">
          <input type="text" maxlength="1" data-row="1" data-col="0" disabled>
          <input type="text" maxlength="1" data-row="1" data-col="1" disabled>
          <input type="text" maxlength="1" data-row="1" data-col="2" disabled>
          <input type="text" maxlength="1" data-row="1" data-col="3" disabled>
          <input type="text" maxlength="1" data-row="1" data-col="4" disabled>
        </div>
        <!-- Row 2 -->
        <div class="row" id="row-2">
          <input type="text" maxlength="1" data-row="2" data-col="0" disabled>
          <input type="text" maxlength="1" data-row="2" data-col="1" disabled>
          <input type="text" maxlength="1" data-row="2" data-col="2" disabled>
          <input type="text" maxlength="1" data-row="2" data-col="3" disabled>
          <input type="text" maxlength="1" data-row="2" data-col="4" disabled>
        </div>
        <!-- Row 3 -->
        <div class="row" id="row-3">
          <input type="text" maxlength="1" data-row="3" data-col="0" disabled>
          <input type="text" maxlength="1" data-row="3" data-col="1" disabled>
          <input type="text" maxlength="1" data-row="3" data-col="2" disabled>
          <input type="text" maxlength="1" data-row="3" data-col="3" disabled>
          <input type="text" maxlength="1" data-row="3" data-col="4" disabled>
        </div>
        <!-- Row 4 -->
        <div class="row" id="row-4">
          <input type="text" maxlength="1" data-row="4" data-col="0" disabled>
          <input type="text" maxlength="1" data-row="4" data-col="1" disabled>
          <input type="text" maxlength="1" data-row="4" data-col="2" disabled>
          <input type="text" maxlength="1" data-row="4" data-col="3" disabled>
          <input type="text" maxlength="1" data-row="4" data-col="4" disabled>
        </div>
        <!-- Row 5 -->
        <div class="row" id="row-5">
          <input type="text" maxlength="1" data-row="5" data-col="0" disabled>
          <input type="text" maxlength="1" data-row="5" data-col="1" disabled>
          <input type="text" maxlength="1" data-row="5" data-col="2" disabled>
          <input type="text" maxlength="1" data-row="5" data-col="3" disabled>
          <input type="text" maxlength="1" data-row="5" data-col="4" disabled>
        </div>
      </div>

      <div id="keyboard">
        <div class="keyboard-row">
          <button data-key="q">Q</button>
          <button data-key="w">W</button>
          <button data-key="e">E</button>
          <button data-key="r">R</button>
          <button data-key="t">T</button>
          <button data-key="y">Y</button>
          <button data-key="u">U</button>
          <button data-key="i">I</button>
          <button data-key="o">O</button>
          <button data-key="p">P</button>
          <button data-key="å">Å</button>
        </div>
        <div class="keyboard-row">
          <button data-key="a">A</button>
          <button data-key="s">S</button>
          <button data-key="d">D</button>
          <button data-key="f">F</button>
          <button data-key="g">G</button>
          <button data-key="h">H</button>
          <button data-key="j">J</button>
          <button data-key="k">K</button>
          <button data-key="l">L</button>
          <button data-key="ø">Ø</button>
          <button data-key="æ">Æ</button>
        </div>
        <div class="keyboard-row">
          <button data-key="Enter" class="key-wide">ENTER</button>
          <button data-key="z">Z</button>
          <button data-key="x">X</button>
          <button data-key="c">C</button>
          <button data-key="v">V</button>
          <button data-key="b">B</button>
          <button data-key="n">N</button>
          <button data-key="m">M</button>
          <button data-key="Backspace" class="key-wide">&#9003;</button>
        </div>
      </div>

      <footer id="legal-footer">
        <a href="tos.html" target="_blank">Vilkår for bruk</a>
        <span>·</span>
        <a href="privacy.html" target="_blank">Personvern</a>
      </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
